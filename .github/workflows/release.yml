name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            suffix: ""
          - os: linux
            arch: arm64
            suffix: ""
          - os: darwin
            arch: amd64
            suffix: ""
          - os: darwin
            arch: arm64
            suffix: ""
          - os: windows
            arch: amd64
            suffix: ".exe"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          go build -ldflags="-s -w" -o tasklean${{ matrix.suffix }} ./cmd/tasklean

      - name: Prepare archive
        run: |
          if [ "${{ matrix.os }}" = "windows" ]; then
            zip tasklean_${{ matrix.os }}_${{ matrix.arch }}.zip tasklean${{ matrix.suffix }}
          else
            tar czvf tasklean_${{ matrix.os }}_${{ matrix.arch }}.tar.gz tasklean${{ matrix.suffix }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tasklean_${{ matrix.os }}_${{ matrix.arch }}
          path: tasklean_${{ matrix.os }}_${{ matrix.arch }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            cp "$dir"/* release/ 2>/dev/null || true
          done

      - name: Create Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update README with version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          sed -i "s|releases/download/v[^/]*|releases/download/$TAG_NAME|g" README.md
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add README.md
          git commit -m "docs: update download links to $TAG_NAME"
          git push

  save-packages:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare packages
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            cp "$dir"/* release/ 2>/dev/null || true
          done
          ls -la release/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          release_name: Latest Release
          files: release/*
          body: "Latest stable build"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
